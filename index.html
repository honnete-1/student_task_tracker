<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Student Task Tracker</title>
  <meta name="description" content="A modern student task tracker to manage your assignments and deadlines." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            'grotesk': ['Space Grotesk', 'sans-serif'],
            'inter':   ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Our custom stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

 <!--  custom stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

<!-- The body starts with the light background color from our CSS variables -->
<body class="min-h-screen">

  <!-- Section 1: floating metallic nav bar
       Fixed at the top, blurred background, always visible-->
  <nav id="navbar" role="navigation" aria-label="Main navigation">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">

      <!-- Logo / Brand Name -->
      <div class="flex items-center gap-2.5 flex-shrink-0">
        <!-- App icon — simple task checkmark SVG -->
        <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white text-sm font-bold"
             style="background: linear-gradient(135deg, #60A5FA, #3B82F6)">
          ✓
        </div>
        <span class="font-grotesk font-700 text-base font-semibold tracking-tight"
              style="color: var(--text-main)">
          TaskFlow
        </span>
        <!-- This badge updates dynamically via JavaScript -->
        <span class="task-count-pill hidden sm:flex" id="nav-task-count">0</span>
      </div>

      <!-- Center: Live Clock (hidden on very small screens) -->
      <div class="hidden md:block">
        <span id="live-clock">Loading...</span>
      </div>

      <!-- Right side: Theme Toggle Button -->
      <div class="flex items-center gap-3">
        <!-- Small screen clock -->
        <span id="live-clock-sm" class="block md:hidden" style="font-family: 'Space Grotesk'; font-size:12px; color:var(--text-sub)"></span>

        <!-- Dark / Light mode toggle -->
        <!-- The emoji icon changes via JavaScript based on current mode -->
        <button
          class="theme-btn"
          id="theme-toggle"
          aria-label="Toggle dark mode"
          title="Toggle theme">
          🌙
        </button>
      </div>
    </div>
  </nav>
 <!-- main content area-->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 pt-24 pb-16">


    <!-- SECTION 2: Cinematic hero bento card with Large banner with main heading and subtitle-->
    <section id="hero" class="mb-6" aria-label="Hero section">
      <div class="bento-card p-8 sm:p-10 relative overflow-hidden">

        <!-- Decorative background circle -->
        <div class="absolute -top-16 -right-16 w-64 h-64 rounded-full opacity-5"
             style="background: radial-gradient(circle, var(--blue), transparent)">
        </div>

        <div class="relative z-10">

          <!-- Top badge -->
          <div class="label-badge mb-5">
            <span>⚡</span> Student Productivity Dashboard
          </div>

          <!-- Main Heading with shimmer animation effect -->
          <h1 class="hero-title text-4xl sm:text-5xl lg:text-6xl mb-4">
            <span class="shimmer-text">Manage</span>
            <span style="color: var(--text-main)"> your tasks,</span><br />
            <span style="color: var(--text-main)">own your </span>
            <span class="shimmer-text">deadlines.</span>
          </h1>

          <!-- Subtitle description -->
          <p class="text-base sm:text-lg max-w-xl leading-relaxed"
             style="color: var(--text-sub)">
            A clean, minimal workspace to track assignments, projects, and study
            goals, so nothing slips through the cracks.
          </p>

          <!-- Hero bottom bar: quick stats at a glance -->
          <div class="flex flex-wrap gap-4 mt-8 pt-6"
               style="border-top: 1px solid var(--border)">
            <div class="flex items-center gap-2 text-sm" style="color: var(--text-sub)">
              <span class="priority-dot" style="background:#22D3EE"></span>
              <span><strong id="hero-upcoming-count" style="color:var(--text-main)">0</strong> upcoming</span>
            </div>
            <div class="flex items-center gap-2 text-sm" style="color: var(--text-sub)">
              <span class="priority-dot" style="background:#FBBF24"></span>
              <span><strong id="hero-today-count" style="color:var(--text-main)">0</strong> due today</span>
            </div>
            <div class="flex items-center gap-2 text-sm" style="color: var(--text-sub)">
              <span class="priority-dot" style="background:#F87171"></span>
              <span><strong id="hero-overdue-count" style="color:var(--text-main)">0</strong> overdue</span>
            </div>
          </div>
        </div>
      </div>
    </section>
